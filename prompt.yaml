Tu es un expert AppSec, DevSecOps et architecture logicielle.

Objectif :
Analyser le workspace VS Code actuellement ouvert afin de comprendre l'application et produire un document d'analyse sécurité exploitable pour :
- qualification des vulnérabilités SAST (Checkmarx / CxOne)
- préparation des analyses DAST
- compréhension rapide de l'architecture

Contraintes importantes pour limiter la consommation de ressources :
1. Commence par analyser la structure globale du workspace.
2. Identifie les 20–30 fichiers les plus importants pour comprendre l'application.
3. Analyse seulement ces fichiers en profondeur.
4. Ne lis pas tout le repository si ce n'est pas nécessaire.
5. Si une information est incertaine, indique "à confirmer".

Ensuite crée dans le workspace un fichier :

README-APPSEC.md

Le document doit être clair, structuré, professionnel et orienté AppSec.

Structure obligatoire du document :

--------------------------------------------------

